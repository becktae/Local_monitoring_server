<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-mission-control</title>
<style>
  :root{
    --bg:#1a1815; --bg-2:#211e1a; --panel-hi:#26221d;
    --line:#332e27; --line-soft:#2a251f;
    --txt:#e8e2d6; --txt-dim:#a39a89; --txt-faint:#6f6659;
    --clay:#d97757; --clay-dim:#b45f42; --violet:#a78bfa;
    --ok:#7cae5e; --ok-dim:#5c8a42; --warn:#d9a441; --err:#d96b5f;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono","Cascadia Code","DejaVu Sans Mono",Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{max-width:1180px;margin:0 auto;min-height:100vh}
  ::selection{background:var(--clay);color:#1a1815}

  .strip{display:flex;align-items:center;gap:14px;padding:9px 18px;border-bottom:1px solid var(--line);background:var(--bg-2)}
  .dots{display:flex;gap:7px}
  .dots i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .dots i:nth-child(1){background:#d96b5f}.dots i:nth-child(2){background:#d9a441}.dots i:nth-child(3){background:#7cae5e}
  .strip .path{color:var(--txt-faint)}.strip .path b{color:var(--txt-dim);font-weight:400}
  .strip .right{margin-left:auto;display:flex;align-items:center;gap:16px;color:var(--txt-faint)}
  .strip .live{color:var(--ok);display:flex;align-items:center;gap:6px}
  .strip .live.stale{color:var(--err)}
  .blink{width:7px;height:7px;background:currentColor;border-radius:50%;animation:bl 1.4s steps(1) infinite}
  @keyframes bl{50%{opacity:.25}}

  .head{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .head .h1{font-size:15px;color:var(--txt)}
  .head .h1 .c{color:var(--clay)}
  .head .h1 .cursor{display:inline-block;width:8px;height:15px;background:var(--clay);margin-left:3px;vertical-align:text-bottom;animation:bl 1.1s steps(1) infinite}
  .head .desc{color:var(--txt-faint);margin-top:5px;font-size:12px}

  .sect{border-bottom:1px solid var(--line)}
  .shead{display:flex;align-items:center;gap:9px;padding:12px 18px;border-bottom:1px solid var(--line-soft)}
  .shead .pf{color:var(--clay)}
  .shead .rank{color:var(--txt-faint);border:1px solid var(--line);border-radius:3px;padding:0 6px;font-size:11px}
  .shead .title{color:var(--txt-dim);letter-spacing:.4px}
  .shead .tag{margin-left:auto;color:var(--txt-faint);font-size:11px}
  .c-clay{color:var(--clay)}.c-ok{color:var(--ok)}.c-warn{color:var(--warn)}.c-err{color:var(--err)}.c-violet{color:var(--violet)}

  /* ---- priority 1: jobs ---- */
  .jobsum{display:flex;gap:0;border-bottom:1px solid var(--line-soft)}
  .jobsum .cell{padding:13px 18px;border-right:1px solid var(--line-soft)}
  .jobsum .cell:last-child{border-right:none}
  .jobsum .big{font-size:26px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .jobsum .big .u{font-size:13px;color:var(--txt-dim)}
  .jobsum .lbl{color:var(--txt-faint);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}

  .row{display:grid;grid-template-columns:20px 1fr auto;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line-soft);align-items:center}
  .row:last-child{border-bottom:none}
  .row:hover{background:var(--panel-hi)}
  .glyph{font-size:14px;text-align:center}
  .g-ok{color:var(--ok)}.g-fail{color:var(--err)}.g-late{color:var(--warn)}.g-orphan{color:var(--err)}.g-idle{color:var(--txt-faint)}
  .rmain .nm{color:var(--txt)}
  .rmain .id{color:var(--txt-faint);font-size:11px;margin-top:2px}
  .rmain .id .st{padding:1px 6px;border:1px solid var(--line);border-radius:3px;margin-right:7px}
  .st.ok{color:var(--ok);border-color:var(--ok-dim)}
  .st.fail{color:var(--err);border-color:#8a4038}
  .st.late{color:var(--warn);border-color:#8a6a24}
  .st.orphan{color:var(--err);border-color:#8a4038}
  .st.idle{color:var(--txt-faint)}
  .rmeta{text-align:right}
  .rmeta .t{color:var(--txt-dim);font-size:12px;font-variant-numeric:tabular-nums}
  .rmeta .next{color:var(--txt-faint);font-size:11px;margin-top:3px}
  .rmeta .next.orphan{color:var(--err)}

  /* ---- priority 2: ai spend ---- */
  .spendtop{display:grid;grid-template-columns:auto 1fr;gap:0;border-bottom:1px solid var(--line-soft)}
  .spendbig{padding:15px 18px;border-right:1px solid var(--line-soft);min-width:180px}
  .spendbig .v{font-size:30px;color:var(--clay);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .spendbig .lbl{color:var(--txt-faint);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
  .spendbig .mtd{color:var(--txt-faint);font-size:11px;margin-top:8px}
  .spark{display:flex;align-items:flex-end;gap:5px;padding:14px 18px 6px;flex:1}
  .spark .b{flex:1;background:var(--clay);opacity:.5;min-height:3px;border-radius:1px 1px 0 0}
  .spark .b.hot{opacity:1}
  .tk{display:grid;grid-template-columns:auto 1fr auto;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line-soft);align-items:center}
  .tk:last-child{border-bottom:none}
  .tk .mk{width:24px;height:24px;border:1px solid var(--line);display:grid;place-items:center;font-size:12px;border-radius:3px}
  .tk .ti .n{color:var(--txt)}.tk .ti .m{color:var(--txt-faint);font-size:11px;margin-top:2px}
  .tk .tc{text-align:right}.tk .tc .c{font-size:15px;font-variant-numeric:tabular-nums}

  /* ---- priority 3: resources ---- */
  .res{display:grid;grid-template-columns:repeat(2,1fr)}
  .meter{padding:13px 18px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
  .meter:nth-child(2n){border-right:none}
  .meter .mtop{display:flex;justify-content:space-between;align-items:baseline}
  .meter .mname{color:var(--txt-dim);font-size:12px}
  .meter .mname .cap{color:var(--txt-faint);font-size:11px;margin-left:6px}
  .meter .mpct{font-size:14px;font-variant-numeric:tabular-nums}
  .barwrap{margin-top:8px;font-size:10px;letter-spacing:.5px;line-height:1;color:var(--line);white-space:nowrap;overflow:hidden}
  .bar .on-ok{color:var(--ok)}.bar .on-warn{color:var(--warn)}.bar .on-err{color:var(--err)}
  .meter .det{color:var(--txt-faint);font-size:11px;margin-top:7px}

  .foot{padding:13px 18px;color:var(--txt-faint);font-size:11px;display:flex;justify-content:space-between}
  .loading{padding:20px 18px;color:var(--txt-faint)}
</style>
</head>
<body>

  <div class="strip">
    <div class="dots"><i></i><i></i><i></i></div>
    <div class="path">~/agents/<b>mission-control</b></div>
    <div class="right">
      <span>poll 5s</span>
      <span class="live" id="live"><span class="blink"></span><span id="livetxt">watching</span></span>
    </div>
  </div>

  <div class="head">
    <div class="h1"><span class="c">$</span> agent-status <span class="c">--all</span> --host <span id="host">…</span><span class="cursor"></span></div>
    <div class="desc"># job 수행 여부 우선 · 다음 ai 비용 · 마지막 리소스. 로컬 전용.</div>
  </div>

  <!-- PRIORITY 1 : JOBS -->
  <div class="sect">
    <div class="shead"><span class="pf">▸</span><span class="rank">1</span><span class="title">jobs / scheduler</span><span class="tag" id="sched-tag">…</span></div>
    <div class="jobsum" id="jobsum"></div>
    <div id="joblist"><div class="loading">불러오는 중…</div></div>
  </div>

  <!-- PRIORITY 2 : AI SPEND -->
  <div class="sect">
    <div class="shead"><span class="pf">▸</span><span class="rank">2</span><span class="title">ai spend</span><span class="tag" id="tok-tag">…</span></div>
    <div class="spendtop">
      <div class="spendbig">
        <div class="v" id="spend-today">$—</div>
        <div class="lbl">today total</div>
        <div class="mtd">month-to-date <span id="spend-mtd" style="color:var(--txt-dim)">$—</span></div>
      </div>
      <div class="spark" id="spark"></div>
    </div>
    <div id="toklist"></div>
  </div>

  <!-- PRIORITY 3 : RESOURCES -->
  <div class="sect">
    <div class="shead"><span class="pf">▸</span><span class="rank">3</span><span class="title">system / psutil</span><span class="tag" id="res-tag">…</span></div>
    <div class="res" id="res"></div>
  </div>

  <div class="foot">
    <span>local-only · 데이터는 이 PC를 벗어나지 않습니다</span>
    <span id="clock">—</span>
  </div>

<script>
const MARK = {claude:{c:'var(--clay)',b:'var(--clay-dim)',g:'C'},
              gemini:{c:'var(--violet)',b:'#6f5bb0',g:'G'},
              codex:{c:'var(--ok)',b:'var(--ok-dim)',g:'X'}};
const GLYPH = {ok:'●',fail:'✕',late:'▲',orphan:'‼',idle:'○'};

function bar(pct){
  const width=40, on=Math.round(pct/100*width);
  const cls = pct>=85?'on-err':pct>=70?'on-warn':'on-ok';
  return `<span class="bar"><span class="${cls}">${'█'.repeat(on)}</span>${'░'.repeat(width-on)}</span>`;
}
function tone(pct){return pct>=85?'c-err':pct>=70?'c-warn':'c-ok';}

function render(d){
  document.getElementById('host').textContent = d.host || 'local';

  // ---- 1. jobs ----
  const s = d.scheduler.summary;
  document.getElementById('sched-tag').textContent =
    `${d.scheduler.agents.length} agents · sweep ${d.scheduler.swept_at}`;
  document.getElementById('jobsum').innerHTML = `
    <div class="cell"><div class="big ${s.failed||s.orphaned?'c-warn':'c-ok'}">${s.ok}<span class="u">/${s.total} ok</span></div><div class="lbl">success</div></div>
    <div class="cell"><div class="big ${s.failed?'c-err':''}">${s.failed}</div><div class="lbl">failed</div></div>
    <div class="cell"><div class="big ${s.orphaned?'c-err':''}">${s.orphaned}</div><div class="lbl">orphaned</div></div>`;
  document.getElementById('joblist').innerHTML = d.scheduler.agents.map(a=>`
    <div class="row">
      <div class="glyph g-${a.status}">${GLYPH[a.status]||'○'}</div>
      <div class="rmain">
        <div class="nm">${a.name}</div>
        <div class="id"><span class="st ${a.status}">${a.status}</span>${a.detail||''}</div>
      </div>
      <div class="rmeta">
        <div class="t">${a.last_run||'-'}</div>
        <div class="next ${a.status==='orphan'?'orphan':''}">next ${a.next_run||'-'}</div>
      </div>
    </div>`).join('');

  // ---- 2. ai spend ----
  const t = d.tokens;
  document.getElementById('tok-tag').textContent = `${t.source} · ${t.sources.length} sources`;
  document.getElementById('spend-today').textContent = '$'+t.today_total.toFixed(2);
  document.getElementById('spend-mtd').textContent = '$'+t.month_total.toFixed(2);
  const mx = Math.max(...t.spark, 0.01);
  document.getElementById('spark').innerHTML = t.spark.map((v,i)=>
    `<div class="b ${i>=t.spark.length-2?'hot':''}" style="height:${Math.max(6,v/mx*100)}%"></div>`).join('');
  document.getElementById('toklist').innerHTML = t.sources.map(src=>{
    const m = MARK[src.name] || {c:'var(--txt-dim)',b:'var(--line)',g:'?'};
    const tokTxt = src.tokens>=1e6 ? (src.tokens/1e6).toFixed(2)+'M' : Math.round(src.tokens/1e3)+'K';
    return `<div class="tk">
      <div class="mk" style="color:${m.c};border-color:${m.b}">${m.g}</div>
      <div class="ti"><div class="n">${src.name}</div><div class="m">${tokTxt} tok</div></div>
      <div class="tc"><div class="c" style="color:${m.c}">$${src.cost.toFixed(2)}</div></div>
    </div>`;
  }).join('');

  // ---- 3. resources ----
  const r = d.resources;
  document.getElementById('res-tag').textContent = `${r.cores} core · cpu ${r.cpu.toFixed(0)}%`;
  const cards = [];
  cards.push(meterCard('mem', `${r.mem.total_gb} GiB`, r.mem.percent,
    `used ${r.mem.used_gb} · free ${(r.mem.total_gb-r.mem.used_gb).toFixed(1)}`));
  r.disks.forEach(dk=>{
    cards.push(meterCard(dk.mount, `${dk.total_gb} GiB`, dk.percent,
      `used ${dk.used_gb} · free ${dk.total_gb-dk.used_gb}`));
  });
  document.getElementById('res').innerHTML = cards.join('');

  document.getElementById('clock').textContent = d.now + ' KST';
}

function meterCard(name, cap, pct, det){
  return `<div class="meter">
    <div class="mtop"><div class="mname">${name}<span class="cap">${cap}</span></div>
      <div class="mpct ${tone(pct)}">${pct.toFixed(0)}%</div></div>
    <div class="barwrap">${bar(pct)}</div>
    <div class="det">${det}</div></div>`;
}

async function poll(){
  const live=document.getElementById('live'), txt=document.getElementById('livetxt');
  try{
    const res = await fetch('/api/status',{cache:'no-store'});
    const d = await res.json();
    if(d.error) throw new Error(d.error);
    render(d);
    live.classList.remove('stale'); txt.textContent='watching';
  }catch(e){
    live.classList.add('stale'); txt.textContent='offline';
  }
}
poll();
setInterval(poll, 5000);
</script>
</body>
</html>
